site_name: FastSSV Documentation
site_description: Fast Semantic Static Validator — semantic validation framework for OMOP CDM SQL queries
site_url: https://fastomop.github.io/fastSSV/
repo_name: fastomop/fastSSV
repo_url: https://github.com/fastomop/fastSSV
edit_uri: edit/main/docs/
copyright: Copyright &copy; FastSSV contributors

docs_dir: docs

theme:
  name: material
  logo: logo.png
  favicon: logo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fastomop/fastSSV
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fastssv/

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture.md
      - Plugin system: PLUGIN_ARCHITECTURE.md
  - Guides:
      - Semantic rules guide: SEMANTIC_RULES_GUIDE.md
  - Reference:
      - Rules reference: RULES_REFERENCE.md
      - HTTP API: API.md
      - Logging: LOGGING.md
      - JSON output: JSON_OUTPUT.md
