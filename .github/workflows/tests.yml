name: Tests

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv and install dependencies
        # The api extras are required because tests/api/ imports
        # fastapi.testclient; pure [dev] would fail collection there.
        # Using `uv pip install` (not `uv sync`) so only the requested
        # extras are resolved — the [viz] extra has a requires-python
        # conflict that would break a full workspace resolve.
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev,api]"
      - name: Run tests
        env:
          # Skip the docker-compose smoke test in unit-test CI; it has its own
          # workflow that exercises the deploy bundle end-to-end.
          FASTSSV_SKIP_DOCKER_TESTS: "1"
        run: .venv/bin/pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Run ruff check
        run: uvx ruff check src/ tests/ --output-format=github

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Create venv and install with dev + api extras
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev,api]"
      - name: Run tests with coverage
        env:
          FASTSSV_SKIP_DOCKER_TESTS: "1"
        run: .venv/bin/pytest tests/ --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
