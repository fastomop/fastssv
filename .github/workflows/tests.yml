name: Tests

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.8"
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        # The api extras are required because tests/api/ imports
        # fastapi.testclient; pure [dev] would fail collection there.
        run: uv sync --frozen --extra dev --extra api
      - name: Run tests
        env:
          # Skip the docker-compose smoke test in unit-test CI; it has its own
          # workflow that exercises the deploy bundle end-to-end.
          FASTSSV_SKIP_DOCKER_TESTS: "1"
        run: uv run --frozen --no-sync pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.8"
          python-version: "3.13"
      - name: Run ruff check
        run: uvx ruff check src/ tests/ --output-format=github

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.8"
          python-version: "3.13"
      - name: Sync dev + api extras
        run: uv sync --frozen --extra dev --extra api
      - name: Run tests with coverage
        env:
          FASTSSV_SKIP_DOCKER_TESTS: "1"
        run: uv run --frozen --no-sync pytest tests/ --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
