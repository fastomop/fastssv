<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>{% block title %}FastSSV{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
  <script src="{{ url_for('static', path='htmx.min.js') }}" defer></script>
  {% block extra_scripts %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="/" class="brand">FastSSV</a>
      <nav>
        <a href="/" {% if active == 'validate' %}aria-current="page"{% endif %}>Validate</a>
        <a href="/rules" {% if active == 'rules' %}aria-current="page"{% endif %}>Rules</a>
        <a href="/docs" target="_blank" rel="noopener">API</a>
        <a href="https://github.com/fastomop/fastSSV/tree/main/docs"
           target="_blank" rel="noopener noreferrer">Docs</a>
      </nav>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="wrap">
      <span>Static validation of OMOP CDM SQL · {{ rules_loaded }} rules loaded</span>
      <a href="https://github.com/fastomop/fastSSV"
         class="footer-link"
         target="_blank"
         rel="noopener noreferrer"
         title="GitHub repository"
         aria-label="FastSSV on GitHub">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
          <path d="M12 0.5C5.65 0.5 0.5 5.65 0.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2.1c-3.2.7-3.87-1.37-3.87-1.37-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.25 3.33.95.1-.74.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.04 0 0 .97-.31 3.18 1.18a11.04 11.04 0 0 1 5.8 0c2.21-1.49 3.18-1.18 3.18-1.18.62 1.58.23 2.75.12 3.04.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.41-5.26 5.69.41.36.77 1.05.77 2.12v3.14c0 .31.21.67.8.56C20.22 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/>
        </svg>
        <span class="visually-hidden">GitHub</span>
      </a>
    </div>
  </footer>
</body>
</html>
