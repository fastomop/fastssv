[project]
site_name = "FastSSV Documentation"
site_description = "Fast Semantic Static Validator — semantic validation framework for OMOP CDM SQL queries"
site_url = "https://fastomop.github.io/fastSSV/"
repo_name = "fastomop/fastSSV"
repo_url = "https://github.com/fastomop/fastSSV"
edit_uri = "edit/main/docs/"
copyright = "Copyright &copy; FastSSV contributors"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "Architecture" = [
      { "Overview" = "architecture.md" },
      { "Plugin system" = "plugin_architecture.md" },
  ] },
  { "Guides" = [
      { "Semantic rules guide" = "semantic_rules_guide.md" },
  ] },
  { "Reference" = [
      { "Rules reference" = "rules_reference.md" },
      { "HTTP API" = "api.md" },
      { "Logging" = "logging.md" },
      { "JSON output" = "json_output.md" },
  ] },
]

[project.theme]
variant = "classic"
logo = "logo.png"
favicon = "logo.png"
features = [
  "navigation.instant",
  "navigation.tracking",
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "navigation.indexes",
  "toc.follow",
  "search.highlight",
  "content.code.copy",
  "content.code.annotate",
  "content.action.edit",
  "content.tabs.link",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep orange"
accent = "deep orange"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep orange"
accent = "deep orange"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/fastomop/fastSSV"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/fastssv/"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
